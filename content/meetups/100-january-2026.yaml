name: DevCongress January Meetup
start: "2026-01-31T10:00:00+00:00"
end:   "2026-01-31T15:00:00+00:00"
description: >
  DevCongress is a community of tech enthusiasts passionate about growing a
  strong tech ecosystem in Ghana. Our monthly meetups are all about sharing
  knowledge, learning from each other, and building a supportive developer
  community. Our key focus this year is SECURITY and AI.

  Each meetup includes tech talks and hands-on workshops, and you get to choose
  the format that works best for you and your topic.

  Featuring talks on Claude Code and the OWASP Top 10: 2025 release.
