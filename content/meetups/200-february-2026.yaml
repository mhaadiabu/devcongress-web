description: >
  DevCongress is a tech community passionate about growing a strong tech
  ecosystem in Ghana. This meetup was co-hosted with Blossom, featuring tech
  talks, hands-on workshops, and showcases of applications built by members of
  the Ghanaian tech ecosystem. We wrapped up the event with pizza, drinks, and
  networking.
