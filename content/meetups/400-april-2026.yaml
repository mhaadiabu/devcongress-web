name: DevCongress April Meetup
start: "2026-04-25T10:00:00+00:00"
end:   "2026-04-25T15:00:00+00:00"
description: >
  DevCongress Meetups are builder-focused gatherings for developers, engineers,
  and tech enthusiasts who want to learn from real-world experiences and connect
  with others building in the ecosystem.

  Featuring a tech talk on memory consistency and cache coherence, a design
  session with UXDerrick, system design discussion, product/tool demos, a
  Kahoot session, and pizza & networking.

